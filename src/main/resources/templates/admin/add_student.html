<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <script src="/js/jquery.min.js"></script>
    <script src="/lib/layui/layui.js"></script>
    <link rel="stylesheet" href="/lib/layui/css/layui.css">
</head>
<style>
    .own-input {
        width: 250px;
    }

    .own-form {
        margin-top: 20px;
    }
</style>
<body>
<form class="layui-form own-form" id="admin" onsubmit="return false" action="">
    <div class="layui-form-item">
        <label class="layui-form-label">姓名</label>
        <div class="layui-input-block">
            <input type="text" id="name" required lay-verify="required" placeholder="请输入姓名" autocomplete="off"
                   class="layui-input own-input">
        </div>
    </div>
    <div class="layui-form-item">
        <label class="layui-form-label">性别</label>
        <div class="layui-input-block">
            <input type="text" id="sex" required lay-verify="required" placeholder="请输入性别" autocomplete="off"
                   class="layui-input own-input">
        </div>
    </div>
    <div class="layui-form-item">
        <label class="layui-form-label">年龄</label>
        <div class="layui-input-block">
            <input type="text" id="age" required lay-verify="required" placeholder="请输入年龄" autocomplete="off"
                   class="layui-input own-input">
        </div>
    </div>
    <div class="layui-form-item">
        <label class="layui-form-label">学号</label>
        <div class="layui-input-block">
            <input type="text" id="studentId" required lay-verify="required" placeholder="请输入学号" autocomplete="off"
                   class="layui-input own-input">
        </div>
    </div>
    <div class="layui-form-item">
        <label class="layui-form-label">辅导员工号</label>
        <div class="layui-input-block">
            <input type="text" id="counselorWorkId" required lay-verify="required" placeholder="请输入工号" autocomplete="off"
                   class="layui-input own-input">
        </div>
    </div>
    <div class="layui-form-item">
        <div class="layui-input-block">
            <button class="layui-btn" id="submit" lay-submit lay-filter="demo-validate">新增</button>
            <button type="reset" class="layui-btn layui-btn-primary">重置</button>
        </div>
    </div>
</form>
</body>
<script>
    layui.use(['layer', 'form'], function () {
        let layer = layui.layer;
        var form = layui.form;
        // 提交事件
        form.on('submit(demo-validate)', function () {
            submitStudentInfo();
        })
    });

    function submitStudentInfo() {
        var student = {};
        student.name = $("#name").val();
        student.sex = $("#sex").val();
        student.age = $("#age").val();
        student.studentId = $("#studentId").val();
        student.counselorWorkId = $("#counselorWorkId").val();
        $.ajax({
            url: "/api/stu/add_student",
            type: "post",
            contentType: "application/json;charset=utf-8",
            data: JSON.stringify(student),
            success: function (rs) {
                if (rs.code === undefined) {
                    alert("请先登录")
                    window.open("/page/sign_out", "_blank")
                }
                if (rs.code === 200) {
                    layer.msg("添加成功")
                    setTimeout(function () {
                        var index = parent.layer.getFrameIndex(window.name); //先得到当前iframe层的索引
                        parent.layer.close(index); //再执行关闭
                        window.parent.location.reload();
                    }, 1200)
                } else {
                    layer.msg(rs.message)
                }
            }

        })

    }
</script>
</html>
