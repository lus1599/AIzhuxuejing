<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml">

<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <script src="/js/jquery.min.js"></script>
    <script src="/lib/layui/layui.js"></script>
    <link rel="stylesheet" href="/lib/layui/css/layui.css">
</head>
<style>
    .own-input {
        width: 250px;
    }

    .own-form {
        margin-top: 20px;
    }
</style>

<body>
    <form class="layui-form own-form" id="admin" onsubmit="return false" action="">
        <div class="layui-form-item">
            <label class="layui-form-label">年级名称</label>
            <div class="layui-input-block">
                <input type="text" id="collegeName" required lay-verify="required" placeholder="请输入班级名称"
                    autocomplete="off" class="layui-input own-input">
            </div>
        </div>
        <div class="layui-form-item">
            <label class="layui-form-label">学生学号</label>
            <div class="layui-input-block">
                <input type="text" id="stuNumber" required lay-verify="required" placeholder="请输入学生学号"
                    autocomplete="off" class="layui-input own-input">
            </div>
        </div>
        <div class="layui-form-item">
            <label class="layui-form-label">学期</label>
            <div class="layui-input-block">
                <input type="text" id="xueqi" required lay-verify="required" placeholder="请输入学期" autocomplete="off"
                    class="layui-input own-input">
            </div>
        </div>
        <div class="layui-form-item">
            <label class="layui-form-label">语文</label>
            <div class="layui-input-block">
                <input type="text" id="scoreDe" required lay-verify="required" placeholder="请输入分数" autocomplete="off"
                    class="layui-input own-input">
            </div>
        </div>
        <div class="layui-form-item">
            <label class="layui-form-label">数学</label>
            <div class="layui-input-block">
                <input type="text" id="scoreZhi" required lay-verify="required" placeholder="请输入分数" autocomplete="off"
                    class="layui-input own-input">
            </div>
        </div>
        <div class="layui-form-item">
            <label class="layui-form-label">外语</label>
            <div class="layui-input-block">
                <input type="text" id="scoreTi" required lay-verify="required" placeholder="请输入分数" autocomplete="off"
                    class="layui-input own-input">
            </div>
        </div>
        <div class="layui-form-item">
            <label class="layui-form-label">理综或文综</label>
            <div class="layui-input-block">
                <input type="text" id="scoreNeng" required lay-verify="required" placeholder="请输入分数" autocomplete="off"
                    class="layui-input own-input">
            </div>
        </div>



        <div class="layui-form-item">
            <div class="layui-input-block">
                <button class="layui-btn" id="submit" lay-submit lay-filter="demo-validate">新增</button>
                <button type="reset" class="layui-btn layui-btn-primary">重置</button>
            </div>
        </div>
    </form>
</body>
<script>
    layui.use(['layer', 'form'], function () {
        let layer = layui.layer;
        var form = layui.form;
        // 提交事件
        form.on('submit(demo-validate)', function () {
            submitScore();
        })
    });

    function submitScore() {
        var score = {};
        score.collegeName = $("#collegeName").val();
        score.stuNumber = $("#stuNumber").val();
        score.xueqi = $("#xueqi").val();
        score.scoreDe = $("#scoreDe").val();
        score.scoreZhi = $("#scoreZhi").val();
        score.scoreTi = $("#scoreTi").val();
        score.scoreNeng = $("#scoreNeng").val();
        $.ajax({
            url: "/api/score/add_by_tea",
            type: "post",
            contentType: "application/json;charset=utf-8",
            data: JSON.stringify(score),
            success: function (rs) {
                if (rs.code === undefined) {
                    alert("请先登录")
                    window.open("/page/sign_out", "_blank")
                }
                if (rs.code === 200) {
                    layer.msg("添加成功")
                    setTimeout(function () {
                        var index = parent.layer.getFrameIndex(window.name); //先得到当前iframe层的索引
                        parent.layer.close(index); //再执行关闭
                        window.parent.location.reload();
                    }, 1200)
                } else {
                    layer.msg(rs.message)
                }
            }

        })

    }
</script>

</html>
