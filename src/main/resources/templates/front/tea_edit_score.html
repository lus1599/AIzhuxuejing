<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml">

<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <script src="/js/jquery.min.js"></script>
    <script src="/lib/layui/layui.js"></script>
    <script src="/lib/layui/lay/modules/layer.js"></script>
    <script src="/lib/layui/lay/modules/admin.js"></script>
    <link rel="stylesheet" href="/layui/css/layui.css">
</head>
<style>
    .own-input {
        width: 250px;
    }

    .own-form {
        margin-top: 20px;
    }
</style>

<body>
    <form class="layui-form own-form" onsubmit="return false" action="">
        <div class="layui-form-item">
            <label class="layui-form-label">年级名称</label>
            <div class="layui-input-block">
                <input type="text" id="collegeName" required lay-verify="required" placeholder="请输入班级名称"
                    autocomplete="off" class="layui-input own-input">
            </div>
        </div>
        <div class="layui-form-item">
            <label class="layui-form-label">学生学号</label>
            <div class="layui-input-block">
                <input type="text" id="stuNumber" required lay-verify="required" placeholder="请输入学生学号"
                    autocomplete="off" class="layui-input own-input">
            </div>
        </div>
        <div class="layui-form-item">
            <label class="layui-form-label">学生姓名</label>
            <div class="layui-input-block">
                <input type="text" id="stuName" required lay-verify="required" placeholder="请输入学生姓名"
                    autocomplete="off" class="layui-input own-input">
            </div>
        </div>
        <div class="layui-form-item">
            <label class="layui-form-label">学期</label>
            <div class="layui-input-block">
                <input type="text" id="xueqi" readonly  required lay-verify="required" placeholder="学期" autocomplete="off"
                    class="layui-input own-input">
            </div>
        </div>
        <div class="layui-form-item">
            <label class="layui-form-label">语文</label>
            <div class="layui-input-block">
                <input type="text" id="scoreDe" required lay-verify="required" placeholder="请输入分数" autocomplete="off"
                    class="layui-input own-input">
            </div>
        </div>
        <div class="layui-form-item">
            <label class="layui-form-label">数学</label>
            <div class="layui-input-block">
                <input type="text" id="scoreZhi" required lay-verify="required" placeholder="请输入分数" autocomplete="off"
                    class="layui-input own-input">
            </div>
        </div>
        <div class="layui-form-item">
            <label class="layui-form-label">外语</label>
            <div class="layui-input-block">
                <input type="text" id="scoreTi" required lay-verify="required" placeholder="请输入分数" autocomplete="off"
                    class="layui-input own-input">
            </div>
        </div>
        <div class="layui-form-item">
            <label class="layui-form-label">理综或文综</label>
            <div class="layui-input-block">
                <input type="text" id="scoreNeng" required lay-verify="required" placeholder="请输入分数" autocomplete="off"
                    class="layui-input own-input">
            </div>
        </div>
        <div class="layui-form-item">
            <div class="layui-input-block">
                <button class="layui-btn" id="submit" lay-submit lay-filter="demo-validate">确定修改</button>
                <button type="reset" class="layui-btn layui-btn-primary">重置</button>
            </div>
        </div>
        <!--    把角色id临时存储到这里，修改以后需要根据这个id来修改信息-->
        <input id="tempId" style="display:none;">
    </form>
</body>
<script>
    // 这里正常情况外面不加单引号也是可以获取的，不知道是不是中文还是什么原因
    // 我这里不加单引号获取是会未定义的错误
    var id = '[[${id}]]'

    layui.use(['layer', 'form'], function () {
        let layer = layui.layer;
        let form = layui.form;
        // 提交事件
        form.on('submit(demo-validate)', function () {
            submitScoreInfo();
        })
    });
    queryScoreInfoById();

    function queryScoreInfoById() {
        $.ajax({
            url: "/api/score/query_score_by_id?id=" + id,
            type: "get",
            contentType: "application/json;charset=utf-8",
            success: function (rs) {
                if (rs.code === undefined) {
                    alert("请先登录")
                    window.open("/page/sign_out", "_blank")
                }
                $("#collegeName").val(rs.data.collegeName);
                $("#stuNumber").val(rs.data.stuNumber);
                $("#stuName").val(rs.data.stuName);
                $("#xueqi").val(rs.data.xueqi);
                $("#scoreDe").val(rs.data.scoreDe);
                $("#scoreZhi").val(rs.data.scoreZhi);
                $("#scoreTi").val(rs.data.scoreTi);
                $("#scoreNeng").val(rs.data.scoreNeng);
                $("#tempId").val(rs.data.id);
            }

        })
    }

    function submitScoreInfo() {
        var score = {};
        score.collegeName = $("#collegeName").val();
        score.stuNumber = $("#stuNumber").val();
        score.stuName = $("#stuName").val();
        score.xueqi = $("#xueqi").val();
        score.scoreDe = $("#scoreDe").val();
        score.scoreZhi = $("#scoreZhi").val();
        score.scoreTi = $("#scoreTi").val();
        score.scoreNeng = $("#scoreNeng").val();
        score.id = $("#tempId").val();
        console.log(score)
        $.ajax({
            url: "/api/score/update",
            type: "post",
            contentType: "application/json;charset=utf-8",
            data: JSON.stringify(score),
            success: function (rs) {
                if (rs.code === undefined) {
                    alert("请先登录")
                    window.open("/page/sign_out", "_blank")
                }
                if (rs.code === 200) {
                    layer.msg("修改成功")
                    setTimeout(function () {
                        var index = parent.layer.getFrameIndex(window.name); //先得到当前iframe层的索引
                        parent.layer.close(index); //再执行关闭
                        window.parent.location.reload();
                    }, 1200)
                }
            }

        })

    }
</script>

</html>
