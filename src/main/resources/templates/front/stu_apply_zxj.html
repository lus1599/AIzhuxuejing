<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <title>申请助学金 - 智能申请</title>
    <script src="/js/jquery.min.js"></script>
    <script src="/layui/layui.js"></script>
    <script src="/lib/layui/lay/modules/layer.js"></script>
    <script src="/lib/layui/lay/modules/admin.js"></script>
    <link rel="stylesheet" href="/layui/css/layui.css">
    <!-- 使用Google Fonts增强现代感 -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap">
    <style>
        body {
            /* 你也可以根据需求去掉渐变背景，使用纯色背景 */
            background: linear-gradient(135deg, #e0eafc, #cfdef3);
            font-family: 'Roboto', sans-serif;
            margin: 0;
            padding: 0;
        }
        .own-form {
            /* 在弹窗或页面中都能保持较大尺寸 */
            margin: 20px auto;
            /* 这里设置一个较大的宽度，高度根据内容自动撑开 */
            width: 900px;
            padding: 40px 50px;
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.15);
        }
        .form-header {
            text-align: left;
            margin-bottom: 20px;
        }
        .form-header h2 {
            margin: 0;
            font-weight: 500;
            color: #333;
            font-size: 24px;
        }
        .form-header p {
            color: #666;
            font-size: 14px;
            margin-top: 5px;
            line-height: 1.6;
        }
        .own-input {
            width: 100%;
            max-width: 100%;
            border: 1px solid #ccc;
            border-radius: 6px;
            padding: 10px;
            transition: border-color 0.3s ease;
        }
        .own-input:focus {
            border-color: #66bb6a;
            outline: none;
            box-shadow: 0 0 5px rgba(102, 187, 106, 0.5);
        }
        .layui-form-label {
            width: 100px; /* 根据需求可调整标签宽度 */
            text-align: right;
        }
        .layui-input-block {
            margin-left: 120px; /* 与标签宽度保持匹配 */
        }
        .layui-btn {
            transition: background-color 0.3s ease, transform 0.3s ease;
        }
        .layui-btn:hover {
            transform: translateY(-2px);
        }
        /* 申请说明提示框，可根据需要放置在任意位置 */
        .apply-instruction {
            margin-bottom: 20px;
            padding: 15px;
            background: #f9f9f9;
            border-left: 5px solid #66bb6a;
            border-radius: 6px;
            color: #555;
            line-height: 1.8;
        }
        .apply-instruction h3 {
            margin-top: 0;
            font-size: 16px;
            color: #2e7d32;
        }
        /* 响应式适配：当屏幕较小的时候，自动减小宽度 */
        @media (max-width: 960px) {
            .own-form {
                width: 90%;
                margin: 20px auto;
                padding: 30px 20px;
            }
            .layui-form-label {
                width: 80px;
            }
            .layui-input-block {
                margin-left: 100px;
            }
        }
    </style>
</head>
<body>
<form class="layui-form own-form" onsubmit="return false">
    <!-- 表单头部及详细申请说明 -->
    <div class="form-header">
        <h2>申请助学金</h2>
        <p>本申请表用于提交助学金申请，请务必如实、详细地填写各项信息，以便系统和审核老师进行综合评估。</p>
    </div>

    <!-- 这里放置一个更加详细的申请说明 -->
    <div class="apply-instruction">
        <h3>申请说明：</h3>
        <ul style="padding-left: 20px; margin: 0;">
            <li>1. 填写申请理由时，请尽量详细说明家庭经济状况、个人收入来源以及特殊困难等。</li>
            <li>2. 建议上传至少一张证明图片，可包括家庭收入证明、家庭成员情况等支持材料。</li>
            <li>3. 系统会在提交后对信息进行智能化预审，审核老师也会进行人工复核，预计3~5个工作日完成。</li>
            <li>4. 审核结果将通过系统消息或手机短信通知，请保持联系方式畅通。</li>
            <li>5. 若在审核期间有任何疑问，可随时与学生处或辅导员联系。</li>
        </ul>
    </div>

    <div class="layui-form-item">
        <label class="layui-form-label">申请理由</label>
        <div class="layui-input-block">
        <textarea
                id="applyTiaojian"
                required
                lay-verify="required"
                placeholder="请在此处填写您的申请理由，建议150字以上..."
                autocomplete="off"
                class="layui-input own-input"
                style="height:160px;"></textarea>
        </div>
    </div>

    <div class="layui-form-item">
        <label class="layui-form-label">图片附件</label>
        <div class="layui-input-block">
            <button type="button" class="layui-btn" id="ID-upload-demo-btn">
                <i class="layui-icon layui-icon-upload"></i> 上传证明图片
            </button>
            <div style="width: 160px; margin-top: 15px;">
                <div class="layui-upload-list">
                    <img
                            class="layui-upload-img"
                            id="ID-upload-demo-img"
                            style="width: 100%; height: 120px; border: 1px solid #ddd; border-radius: 6px;">
                    <div id="ID-upload-demo-text"></div>
                </div>
                <div class="layui-progress layui-progress-big" lay-showPercent="yes" lay-filter="filter-demo">
                    <div class="layui-progress-bar" lay-percent=""></div>
                </div>
            </div>
        </div>
    </div>

    <div class="layui-form-item" style="text-align: center; margin-top: 30px;">
        <button class="layui-btn" id="submit" lay-submit lay-filter="demo-validate">提交申请</button>
        <button type="reset" class="layui-btn layui-btn-primary" id="reset">重置表单</button>
    </div>

    <!-- 隐藏字段：角色id等 -->
    <input id="tempId" style="display:none;">
</form>

<script>
    var id = '[[${id}]]';
    var img;

    layui.use(['layer', 'form'], function () {
        let layer = layui.layer;
        let form = layui.form;
        form.on('submit(demo-validate)', function () {
            if (!$('#applyTiaojian').val().trim()) {
                layer.msg('请填写申请理由', { icon: 2 });
                return false;
            }
            if (!img) {
                layer.msg('请上传证明图片', { icon: 2 });
                return false;
            }
            submitApply();
        });
    });

    var upload = layui.upload;
    var element = layui.element;

    // 图片上传
    var uploadInst = upload.render({
        elem: '#ID-upload-demo-btn',
        url: '/api/file/upload',
        before: function (obj) {
            obj.preview(function (index, file, result) {
                $('#ID-upload-demo-img').attr('src', result);
            });
            element.progress('filter-demo', '0%');
            layer.msg('图片上传中，请稍候...', { icon: 16, time: 0 });
        },
        done: function (res) {
            if (res.code !== 200) {
                return layer.msg('上传失败');
            }
            img = res.data;
            $('#ID-upload-demo-text').html('');
        },
        error: function () {
            var demoText = $('#ID-upload-demo-text');
            demoText.html('<span style="color: #FF5722;">上传失败</span> <a class="layui-btn layui-btn-xs demo-reload">重试</a>');
            demoText.find('.demo-reload').on('click', function () {
                uploadInst.upload();
            });
        },
        progress: function (n, elem, e) {
            element.progress('filter-demo', n + '%');
            if (n == 100) {
                layer.msg('上传完毕', { icon: 1 });
            }
        }
    });

    // 重置表单
    $("#reset").click(function () {
        img = "";
        $("#ID-upload-demo-img").attr('src', '');
    });

    // 提交申请
    function submitApply() {
        var apply = {};
        apply.zxjId = id;
        apply.applyTiaojian = $("#applyTiaojian").val();
        apply.img = img;
        $.ajax({
            url: "/api/apply/stu_apply_zxj",
            type: "post",
            contentType: "application/json;charset=utf-8",
            data: JSON.stringify(apply),
            success: function (rs) {
                if (!rs.code) {
                    alert("请先登录");
                    window.open("/page/sign_out", "_blank");
                }
                if (rs.code === 200) {
                    layer.msg("申请成功，等待辅导员审核...");
                    setTimeout(function () {
                        var index = parent.layer.getFrameIndex(window.name);
                        parent.layer.close(index);
                        window.parent.location.reload();
                    }, 1200);
                } else {
                    layer.msg(rs.message);
                }
            }
        });
    }
</script>
</body>
</html>
