<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <script src="/js/jquery.min.js"></script>
    <script src="/lib/layui/layui.js"></script>
    <script src="/lib/layui/lay/modules/layer.js"></script>
    <script src="/lib/layui/lay/modules/admin.js"></script>
    <link rel="stylesheet" href="/layui/css/layui.css">
</head>
<style>
    .own-input {
        width: 250px;
    }

    .own-form {
        margin-top: 20px;
    }
</style>
<body>
<form class="layui-form own-form" onsubmit="return false" action="">
    <div class="layui-form-item">
        <label class="layui-form-label">助学金种类</label>
        <div class="layui-input-block">
            <input type="text" id="zxjName" required lay-verify="required" placeholder="请输入助学金名" autocomplete="off"
                   class="layui-input own-input">
        </div>
    </div>
    <div class="layui-form-item">
        <label class="layui-form-label">金额</label>
        <div class="layui-input-block">
            <input type="text" id="zxjMoney" required lay-verify="required" placeholder="请输入金额" autocomplete="off"
                   class="layui-input own-input">
        </div>
    </div>
    <div class="layui-form-item">
        <label class="layui-form-label">申请条件</label>
        <div class="layui-input-block">
            <textarea type="text" id="zxjTiaojian" required lay-verify="required" placeholder="请输入申请条件" autocomplete="off"
                   class="layui-input own-input"></textarea>
        </div>
    </div>
    <div class="layui-form-item">
        <div class="layui-input-block">
            <button class="layui-btn" id="submit" lay-submit lay-filter="demo-validate">确定修改</button>
            <button type="reset" class="layui-btn layui-btn-primary">重置</button>
        </div>
    </div>
    <!--    把角色id临时存储到这里，修改以后需要根据这个id来修改信息-->
    <input id="tempId" style="display:none;">
</form>
</body>
<script>
    // 这里正常情况外面不加单引号也是可以获取的，不知道是不是中文还是什么原因
    // 我这里不加单引号获取是会未定义的错误
    var id = '[[${id}]]'

    layui.use(['layer', 'form'], function () {
        let layer = layui.layer;
        let form = layui.form;
        // 提交事件
        form.on('submit(demo-validate)', function () {
            submitZxjInfo();
        })
    });
    queryZxjInfoById();

    function queryZxjInfoById() {
        $.ajax({
            url: "/api/zxj/query_zxj_by_id?id=" + id,
            type: "get",
            contentType: "application/json;charset=utf-8",
            success: function (rs) {
                if (rs.code === undefined) {
                    alert("请先登录")
                    window.open("/page/sign_out", "_blank")
                }
                $("#zxjName").val(rs.data.zxjName);
                $("#zxjMoney").val(rs.data.zxjMoney);
                $("#zxjTiaojian").val(rs.data.zxjTiaojian);
                $("#tempId").val(rs.data.id);
            }

        })
    }

    function submitZxjInfo() {
        var zxj = {};
        zxj.zxjName = $("#zxjName").val();
        zxj.zxjMoney = $("#zxjMoney").val();
        zxj.zxjTiaojian = $("#zxjTiaojian").val();
        zxj.id = $("#tempId").val();
        $.ajax({
            url: "/api/zxj/update_zxj",
            type: "post",
            contentType: "application/json;charset=utf-8",
            data: JSON.stringify(zxj),
            success: function (rs) {
                if (rs.code === undefined) {
                    alert("请先登录")
                    window.open("/page/sign_out", "_blank")
                }
                if (rs.code === 200) {
                    layer.msg("修改成功")
                    setTimeout(function () {
                        var index = parent.layer.getFrameIndex(window.name); //先得到当前iframe层的索引
                        parent.layer.close(index); //再执行关闭
                        window.parent.location.reload();
                    }, 1200)
                }
            }

        })

    }
</script>
</html>
