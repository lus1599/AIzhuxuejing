<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <link rel="stylesheet" href="/layui/css/layui.css">
    <style>
        * {
            margin: 0;
            padding: 0;
        }
    </style>
</head>
<body>
<div>
    <div class="layui-form-item">
        <div class="layui-inline">
            <input type="text" name="name" placeholder="请输入助学金名" id="name" autocomplete="off" class="layui-input">
        </div>
        <div class="layui-inline">
            <button type="button" id="search" data-type="reload" class="layui-btn layui-btn-normal">搜索</button>
        </div>
        <div class="layui-inline">
            <button type="button" id="addzxjInfo" class="layui-btn layui-btn-normal">添加</button>
        </div>
    </div>
</div>

<table class="layui-hide" id="zxjInfo" lay-filter="zxjInfoTable"></table>
<div id="limit-page">

</div>

<script src="/lib/layui/layui.js" charset="utf-8"></script>
</body>
</html>
<script type="text/html" id="barDemo">
    <a class="layui-btn layui-btn-sm" lay-event="edit">编辑</a>
    <a class="layui-btn layui-btn-sm layui-btn-danger" lay-event="delete">删除</a>
</script>

<script src="/js/jquery.min.js"></script>
<script src="/layui/layui.js"></script>
<script>

    //加载模块
    layui.use(function () { //亦可加载特定模块：layui.use(['layer', 'laydate', function(){
        //得到各种内置组件
        var layer = layui.layer //弹层
            , table = layui.table //表格
            , element = layui.element //元素操作

        // 页数的默认名称叫page,不是pageNo,每一页的长度不叫pageSize，叫limit，总的数据条数教count
        //执行一个 table 实例
        table.render({
            elem: '#zxjInfo'
            , height: 420
            , url: '/api/zxj/page' //数据接口
            , title: '助学金列表'
            , page: true //开启分页
            , cols: [
                [ //表头
                    {type: 'checkbox', width: '5%', fixed: 'left'}
                    , {field: 'zxjName', title: '助学金种类', align: 'center', width: '25%', fixed: 'left'}
                    , {field: 'zxjMoney', title: '金额', align: 'center', width: '20%',sort: true}
                    , {field: 'zxjTiaojian', title: '申请条件', width: '30%', align: 'center', sort: true, totalRow: true}
                    , {fixed: 'right', title: '操作', width: '20%', align: 'center', toolbar: '#barDemo'}
                ]
            ]
        });

        // 获取到layui里面$重新赋值为$本质上跟jquery的$的差不多，然后给当前模块赋一个名字叫active，方便后面用
        var $ = layui.$, active = {
            reload: function () {
                // 查询框里面输入的值
                var name = $("#name");
                //执行重载，roleTable是上面table容器的id值
                table.reload('zxjInfo', {
                    page: {
                        curr: 1 //重新从第 1 页开始
                    },
                    // 把需要传的值放在where里面，都是json格式
                    where: {
                        name: name.val(), //重载提交的参数
                    }
                });
            }
        };
        // 点击搜索按钮查询，并重新加载table表格
        $('#search').on('click', function () {
            // 获取当前查询按钮的类型，layui里面的data-type属性值，这里是reload
            var type = $(this).data('type');
            // 告诉框架当前执行的是重新加载并通过call方法去执行
            active[type] ? active[type].call(this) : '';
        });
        //添加信息
        $("#addzxjInfo").on("click", function () {
            layer.open({
                type: 2,
                title: "添加助学金信息",
                content: "/page/front/add_zxj",
                //弹窗大小
                area: ['400px', '400px'],
                //弹窗位置
                offset: ['110px', '400px'],
                success: function (layero) {
                    var btn = layero.find('.layui-layer-btn');
                    btn.find('.layui-layer-btn0').attr({
                        href: '../index.htm'
                        , target: '_blank'
                    });
                }
            });
        })


        //监听行工具事件
        table.on('tool(zxjInfoTable)', function (obj) { //注：tool 是工具条事件名，test 是 table 原始容器的属性 lay-filter="对应的值"
            var data = obj.data //获得当前行数据
                , layEvent = obj.event; //获得 lay-event 对应的值
            if (layEvent === 'edit') {
                layer.open({
                    type: 2,
                    title: "修改助学金信息",
                    content: "/page/front/edit_zxj?id=" + data.id,
                    area: ['400px', '500px'],
                    offset: ['110px', '400px'],
                    success: function (layero) {
                        var btn = layero.find('.layui-layer-btn');//确认提交
                        btn.find('.layui-layer-btn0').attr({
                            href: '../index.htm'
                            , target: '_blank'
                        });
                    }
                });
            } else if (layEvent === 'delete') {
                layer.confirm("确定删除吗？", function () {
                    $.ajax({
                        url: "/api/zxj/delete_zxj_by_id?id=" + data.id,
                        success: function (rs) {
                            if (rs.code === 200) {
                                layer.msg("删除成功");
                                setTimeout(function () {
                                    window.location.reload();
                                }, 500);
                            } else {
                                layer.msg(rs.msg);
                            }
                        }
                    });
                })

            }
        });

    });
</script>
</body>
</html>
