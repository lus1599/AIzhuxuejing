<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <!-- 用于控制页面 -->
    <meta charset="utf-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <link rel="stylesheet" href="/layui/css/layui.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* 底部样式 */
        .footer {
            background-color: rgba(255, 255, 255, 0.9); /* 半透明白色背景 */
            color: #333; /* 深灰色字体 */
            text-align: center;
            /*padding: 50px 0;*/
            font-size: 18px; /* 字体增大 */
            font-weight: bold; /* 字体加粗 */
            font-family: 'Helvetica Neue', Arial, sans-serif;
            border-top: 1px solid #e0e0e0; /* 添加顶部边框，使其更显层次感 */
        }

        /* 链接样式 */
        .footer a {
            color: #0066cc; /* 深蓝色链接 */
            text-decoration: none;
            font-weight: bold;
            transition: color 0.3s ease, text-decoration 0.3s ease;
        }

        .footer a:hover {
            color: #f80505; /* 鼠标悬停时链接颜色 */
            text-decoration: underline;
        }

        /* 社交媒体链接 */
        .footer .social-links a {
            margin: 0 15px;
            font-size: 24px;
            color: #0066cc; /* 深蓝色 */
            transition: transform 0.3s ease, color 0.3s ease;
        }

        .footer .social-links a:hover {
            transform: scale(1.1);
            color: #f80505; /* 鼠标悬停时变化 */
        }

        /*.footer .social-links {*/
        /*    margin: 25px 0;*/
        /*}*/

        .footer .contact-info p {
            margin: 12px 0;
            font-size: 16px; /* 调整为较大字体 */
        }

        /* 底部内容的分区样式 */
        .footer .info {
            margin-top: 20px;
            font-size: 16px;
            line-height: 1.8;
            color: #444; /* 更深的灰色 */
        }

        .footer .info p {
            margin-bottom: 15px;
        }

        /* 小屏幕优化 */
        @media (max-width: 768px) {
            .footer .social-links a {
                font-size: 22px;
            }

            .footer .contact-info p {
                font-size: 14px;
            }
        }
    </style>
</head>

<body>
<table class="layui-hide" id="zxjInfo" lay-filter="zxjInfoTable"></table>

<script src="/lib/layui/layui.js" charset="utf-8"></script>
<script src="/js/jquery.min.js"></script>
<script src="/layui/layui.js"></script>
<script>
    layui.use(function () {
        var layer = layui.layer, table = layui.table, element = layui.element;

        table.render({
            elem: '#zxjInfo',
            height: 420,
            url: '/api/apply/apply_pass_stu_list',
            title: '助学金列表',
            page: false,
            cols: [
                [
                    { type: 'checkbox', width: '5%', fixed: 'left' },
                    { field: 'zxjName', title: '助学金名', align: 'center', width: '15%', fixed: 'left', sort: true },
                    { field: 'stuName', title: '申请人', align: 'center', width: '15%', fixed: 'left' },
                    { field: 'applyTime', title: '申请时间', width: '15%', align: 'center', sort: true, totalRow: true },
                    { field: 'applyTiaojian', title: '申请理由', width: '25%', align: 'center', totalRow: true },
                    {
                        field: 'img', title: '申请图片附件', width: '15%', align: 'center', templet: function (d) {
                            if (d.img === null) {
                                return '<span style="color: red">没有附件</span>';
                            } else {
                                return "<a style='color: blue' href='http://127.0.0.1:8080/api/file/" + d.img + "' target='_blank'>点击查看附件</a>";
                            }
                        }
                    },
                    { field: 'status', title: '状态', width: '10%', align: 'center', totalRow: true }
                ]
            ]
        });
    });
</script>

<!-- 底部内容 -->
<div class="footer">
    <div class="info">
        <p>台江县智能助学金管理信息系统为台江县学生提供便捷、高效的助学金申请、审核、发放等服务。通过该系统，学生可以快速提交申请，审批流程透明化，确保助学金的公平分配。</p>
        <p>若有疑问，请访问 <a href="https://www.xszz.edu.cn/" target="_blank">全国助学金管理系统官网</a> 查阅相关信息。</p>
        <div class="contact-info">
            <p>联系我们：<a href="mailto:support@example.com" target="_blank">support@example.com</a></p>
            <p>客服电话：123-456-7890</p>
        </div>
        <p>&copy; 2024 台江县智能助学金管理信息系统.保留所有权利.</p>
    </div>
</div>

</body>

</html>
